<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Viral Clipper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --bg2:     #141414;
  --bg3:     #1c1c1c;
  --surface: #111111;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text:    #f0eeea;
  --text2:   #888580;
  --text3:   #444240;
  --accent:  #e8380d;
  --accent2: #ff5533;
  --green:   #3ecf7a;
  --green-bg:rgba(62,207,122,0.1);
  --amber:   #f59e0b;
  --amber-bg:rgba(245,158,11,0.1);
  --red-bg:  rgba(232,56,13,0.1);
  --mono:    'DM Mono', monospace;
  --sans:    'DM Sans', sans-serif;
  --radius:  10px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── HEADER ── */
header {
  padding: 40px 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo svg { width: 18px; height: 18px; fill: white; }

.brand-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}
.brand-name span { color: var(--accent); }

.ws-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: var(--surface);
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  transition: all 0.25s;
}
.ws-badge.connected { background: var(--green-bg); border-color: rgba(62,207,122,0.3); color: var(--green); }
.ws-badge.error     { background: var(--red-bg);   border-color: rgba(232,56,13,0.3);  color: var(--accent2); }

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.dot.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.stat-label {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
.stat-value {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}
.stat-value.accent { color: var(--accent); }
.stat-value.green  { color: var(--green); }

/* ── INPUT ── */
.input-section { margin-bottom: 28px; }

.input-label {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.url-row { display: flex; gap: 8px; }

.url-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 11px 16px;
  font-size: 13px;
  font-family: var(--mono);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.url-input::placeholder { color: var(--text3); }
.url-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(232,56,13,0.08);
}

.submit-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  padding: 11px 20px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.submit-btn:hover   { background: var(--accent2); }
.submit-btn:active  { transform: scale(0.97); }
.submit-btn:disabled {
  background: var(--bg3);
  color: var(--text3);
  cursor: not-allowed;
}

/* ── PIPELINE ── */
.pipeline {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 28px;
}

.step {
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  border-right: 1px solid var(--border);
  transition: background 0.3s;
}
.step:last-child { border-right: none; }
.step.active { background: rgba(232,56,13,0.08); }
.step.done   { background: var(--green-bg); }

.step-icon {
  width: 30px; height: 30px;
  border-radius: 7px;
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: background 0.3s;
}
.step.active .step-icon { background: var(--accent); }
.step.done   .step-icon { background: rgba(62,207,122,0.18); }

.step-name {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--text3);
  text-align: center;
  line-height: 1.4;
}
.step.active .step-name { color: var(--accent); }
.step.done   .step-name { color: var(--green); }

/* ── VIDEO BAR ── */
.video-bar {
  display: none;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 20px;
  animation: fadeUp 0.3s ease;
}
.video-bar.show { display: flex; }

.vi-icon {
  width: 34px; height: 34px;
  background: var(--red-bg);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.vi-icon svg { width: 16px; height: 16px; fill: var(--accent); }
.vi-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.vi-meta  { font-size: 11px; font-family: var(--mono); color: var(--text3); }

/* ── LOG BOX ── */
.log-box {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 28px;
  max-height: 260px;
  overflow-y: auto;
}
.log-box.show { display: block; }
.log-box::-webkit-scrollbar { width: 3px; }
.log-box::-webkit-scrollbar-track { background: transparent; }
.log-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.log-header {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
}

.log-line {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text2);
  margin-bottom: 4px;
  animation: fadeUp 0.2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

.log-ts  { color: var(--text3); flex-shrink: 0; }
.log-line.success .log-msg { color: var(--green); }
.log-line.error   .log-msg { color: var(--accent); }
.log-line.info    .log-msg { color: var(--amber); }

/* ── CLIPS ── */
.clips-section { display: none; }
.clips-section.show { display: block; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text2);
  font-family: var(--mono);
}
.count-badge {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--accent2);
  background: var(--red-bg);
  border: 1px solid rgba(232,56,13,0.25);
  border-radius: 999px;
  padding: 3px 10px;
}

.clips-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.clip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  gap: 14px;
  animation: fadeUp 0.3s ease both;
  transition: border-color 0.2s;
}
.clip-card:hover { border-color: var(--border2); }

.clip-num-box {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--mono);
  color: var(--text2);
  flex-shrink: 0;
}

.clip-body { flex: 1; min-width: 0; }
.clip-label {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}
.clip-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.clip-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.meta-tag {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text2);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
}
.meta-tag.time { color: var(--accent2); background: var(--red-bg); border-color: rgba(232,56,13,0.25); }
.clip-reason {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
}

/* ── DONE BAR ── */
.done-bar {
  display: none;
  align-items: center;
  gap: 10px;
  background: var(--green-bg);
  border: 1px solid rgba(62,207,122,0.25);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 13px;
  font-family: var(--mono);
  color: var(--green);
  animation: fadeUp 0.3s ease;
}
.done-bar.show { display: flex; }
.done-bar svg { width: 16px; height: 16px; stroke: var(--green); flex-shrink: 0; }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6zm11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
      </div>
      <span class="brand-name">YouTube <span>Viral Clipper</span></span>
    </div>
    <div class="ws-badge" id="ws-badge">
      <div class="dot" id="ws-dot"></div>
      <span id="ws-label">bağlanıyor</span>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Video</div>
      <div class="stat-value accent" id="st-videos">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Klip</div>
      <div class="stat-value green" id="st-clips">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Segment</div>
      <div class="stat-value" id="st-segs">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Süre</div>
      <div class="stat-value" id="st-time">—</div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-section">
    <div class="input-label">YouTube URL</div>
    <div class="url-row">
      <input
        type="text"
        class="url-input"
        id="url-input"
        placeholder="https://youtube.com/watch?v=..."
        autocomplete="off"
      />
      <button class="submit-btn" id="submit-btn" onclick="startProcess()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Analiz Et
      </button>
    </div>
  </div>

  <!-- PIPELINE -->
  <div class="pipeline">
    <div class="step" id="step-1">
      <div class="step-icon">🔍</div>
      <div class="step-name">Bilgi</div>
    </div>
    <div class="step" id="step-2">
      <div class="step-icon">🎵</div>
      <div class="step-name">Ses</div>
    </div>
    <div class="step" id="step-3">
      <div class="step-icon">📝</div>
      <div class="step-name">Whisper</div>
    </div>
    <div class="step" id="step-4">
      <div class="step-icon">🤖</div>
      <div class="step-name">GPT</div>
    </div>
    <div class="step" id="step-5">
      <div class="step-icon">✂️</div>
      <div class="step-name">Klip Kes</div>
    </div>
  </div>

  <!-- VIDEO INFO -->
  <div class="video-bar" id="video-bar">
    <div class="vi-icon">
      <svg viewBox="0 0 24 24"><path d="M19 4H5a2 2 0 00-2 2v12a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zm-1 10l-5-3 5-3v6z"/></svg>
    </div>
    <div>
      <div class="vi-title" id="vi-title">—</div>
      <div class="vi-meta"  id="vi-meta">—</div>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-box" id="log-box">
    <div class="log-header">işlem günlüğü</div>
    <div id="log-lines"></div>
  </div>

  <!-- CLIPS -->
  <div class="clips-section" id="clips-section">
    <div class="section-header">
      <div class="section-title">Viral Klipler</div>
      <div class="count-badge" id="clip-count">0 klip</div>
    </div>
    <div class="clips-grid" id="clips-grid"></div>
    <div class="done-bar" id="done-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span id="done-msg">Klipler kaydedildi.</span>
    </div>
  </div>

</div>

<script>
const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL = `${proto}//${location.host}/ws/process`;
let ws = null;
let processing = false;
let startTime = null;
let totalVideos = 0, totalClips = 0, totalSegs = 0;

function connectWS() {
  const badge = document.getElementById('ws-badge');
  const label = document.getElementById('ws-label');
  const dot   = document.getElementById('ws-dot');

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    badge.className = 'ws-badge connected';
    label.textContent = 'bağlı';
    dot.classList.add('pulse');
  };
  ws.onclose = () => {
    badge.className = 'ws-badge error';
    label.textContent = 'bağlantı yok';
    dot.classList.remove('pulse');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => {
    badge.className = 'ws-badge error';
    label.textContent = 'hata';
  };
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'log':          addLog(msg.msg, msg.level || 'default', msg.extra); break;
    case 'step':         setStep(msg.step, msg.status); break;
    case 'video_info':   showVideoInfo(msg); break;
    case 'clips_preview': break;
    case 'done':         onDone(msg); break;
    case 'error':        onError(msg.msg); break;
  }
}

function ts() { return new Date().toTimeString().slice(0,8); }

function addLog(msg, level = 'default', extra = null) {
  const box = document.getElementById('log-box');
  const lines = document.getElementById('log-lines');
  box.classList.add('show');

  const line = document.createElement('div');
  line.className = `log-line ${level}`;
  line.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-msg">${escHtml(msg)}</span>`;
  lines.appendChild(line);
  lines.scrollTop = lines.scrollHeight;

  if (extra && extra.segments) {
    totalSegs += extra.segments;
    document.getElementById('st-segs').textContent = totalSegs;
  }
}

function setStep(n, status) {
  document.getElementById(`step-${n}`).className = `step ${status}`;
}

function resetSteps() {
  for (let i = 1; i <= 5; i++)
    document.getElementById(`step-${i}`).className = 'step';
}

function showVideoInfo(msg) {
  document.getElementById('vi-title').textContent = msg.title;
  const m = Math.floor(msg.duration / 60);
  const s = msg.duration % 60;
  document.getElementById('vi-meta').textContent =
    `${m}:${s.toString().padStart(2,'0')} · ${msg.url.slice(0,55)}`;
  document.getElementById('video-bar').classList.add('show');
}

function onDone(msg) {
  const results = msg.results || [];
  totalVideos++;
  totalClips += results.length;
  document.getElementById('st-videos').textContent = totalVideos;
  document.getElementById('st-clips').textContent  = totalClips;
  if (startTime) {
    document.getElementById('st-time').textContent =
      Math.round((Date.now() - startTime) / 1000) + 's';
  }
  renderClips(results);
  document.getElementById('done-msg').textContent =
    `${results.length} klip kaydedildi → ${msg.folder}`;
  document.getElementById('done-bar').classList.add('show');
  processing = false;
  document.getElementById('submit-btn').disabled = false;
}

function onError(msg) {
  addLog('Hata: ' + msg, 'error');
  processing = false;
  document.getElementById('submit-btn').disabled = false;
}

function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function renderClips(results) {
  const section = document.getElementById('clips-section');
  const grid    = document.getElementById('clips-grid');
  const count   = document.getElementById('clip-count');

  grid.innerHTML = '';
  count.textContent = results.length + ' klip';

  results.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'clip-card';
    card.style.animationDelay = `${i * 0.1}s`;
    card.innerHTML = `
      <div class="clip-num-box">0${i+1}</div>
      <div class="clip-body">
        <div class="clip-label">Klip ${i+1}</div>
        <div class="clip-title">${escHtml(r.title)}</div>
        <div class="clip-meta">
          <span class="meta-tag time">${fmt(r.start)} → ${fmt(r.end)}</span>
          <span class="meta-tag">${r.duration}s</span>
        </div>
        <div class="clip-reason">${escHtml(r.reason)}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  section.classList.add('show');
}

function startProcess() {
  if (processing) return;

  const url = document.getElementById('url-input').value.trim();
  if (!url) { addLog('URL boş olamaz', 'error'); return; }

  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog('Sunucuya bağlı değil — bekleyin...', 'error');
    return;
  }

  processing = true;
  startTime  = Date.now();
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('log-lines').innerHTML = '';
  document.getElementById('log-box').classList.remove('show');
  document.getElementById('video-bar').classList.remove('show');
  document.getElementById('clips-section').classList.remove('show');
  document.getElementById('done-bar').classList.remove('show');
  resetSteps();

  ws.send(JSON.stringify({ url }));
}

document.getElementById('url-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startProcess();
});

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

connectWS();
</script>
</body>
</html>
